<!doctype html>
<html lang="th">
  <head><meta charset="UTF-8" /><title>Instagram Connect Callback</title></head>
  <body>
    <script>
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const query = new URLSearchParams(window.location.search);

      const accessToken = hash.get('access_token');
      const error = hash.get('error') || hash.get('error_description') || query.get('error') || query.get('error_description');

      if (accessToken) {
        localStorage.setItem('ig_access_token', accessToken);
        localStorage.setItem('ig_connect_status', 'ok');
      } else {
        localStorage.setItem('ig_connect_status', `error:${error || 'unknown error'}`);
      }

      const returnTo = localStorage.getItem('ig_return_to') || new URL('.', window.location.href).toString();
      window.location.href = returnTo;
    </script>

</html>
