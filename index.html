<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IG DM Reply Helper</title>
    <style>
      body { margin:0; font-family: system-ui, sans-serif; background:#f5f7fb; color:#111827; }
      .wrap { max-width: 980px; margin: 24px auto; padding: 0 16px 30px; }
      h1 { margin:0 0 8px; }
      p { color:#4b5563; margin:0 0 14px; }
      .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px; margin-top:12px; }
      .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
      label { display:block; font-size:.9rem; margin-bottom:5px; }
      input,select,textarea { width:100%; box-sizing:border-box; padding:10px; border:1px solid #d1d5db; border-radius:10px; }
      textarea { min-height:100px; resize:vertical; }
      button { margin-top:10px; border:0; border-radius:10px; padding:10px 14px; background:#2563eb; color:#fff; font-weight:700; cursor:pointer; }
      button.secondary { background:#059669; margin-left:8px; }
      button.ig { background:#c026d3; margin-left:8px; }
      pre { background:#0f172a; color:#e2e8f0; padding:12px; border-radius:10px; min-height:130px; overflow:auto; }
      #sendStatus, #connectStatus { margin-top:10px; font-size:.9rem; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>ตัวช่วยตอบ IG DM + ส่งจริง</h1>
      <p>สร้าง JSON คำตอบ แล้วส่งข้อความเข้า Instagram ผ่าน Instagram Graph API (Business/Professional account)</p>

      <section class="card">
        <h3>1) Persona</h3>
        <div class="grid">
          <div><label for="callThem">callThem</label><input id="callThem" placeholder="เธอ" /></div>
          <div><label for="callSelf">callSelf</label><input id="callSelf" placeholder="เรา" /></div>
          <div><label for="tone">tone</label><select id="tone"><option>อบอุ่น</option><option>น่ารัก</option><option selected>เพื่อน</option><option>สุภาพ</option><option>อ้อน</option></select></div>
          <div><label for="length">length</label><select id="length"><option>สั้น</option><option selected>กลาง</option><option>ยาว</option></select></div>
          <div><label for="ending">ending</label><select id="ending"><option selected>ไม่มี</option><option>นะ</option><option>ครับ</option><option>ค่ะ</option><option>นุ่ม ๆ</option></select></div>
          <div><label for="emoji">emoji</label><select id="emoji"><option>ไม่ใช้</option><option selected>นิดหน่อย</option><option>น่ารัก</option></select></div>
        </div>
        <div style="margin-top:10px"><label for="specialRule">specialRule</label><input id="specialRule" placeholder="เช่น ห้ามใช้คำว่า คิดถึง" /></div>
        <div style="margin-top:10px"><label for="latest">ข้อความล่าสุดจากอีกฝ่าย</label><textarea id="latest" placeholder="พิมพ์ข้อความล่าสุด..."></textarea></div>
        <button id="genBtn">Generate JSON</button>
      </section>

      <section class="card">
        <h3>2) เชื่อมต่อ Instagram</h3>
        <div class="grid">
          <div><label for="igUserId">IG User ID (ของบัญชีเรา)</label><input id="igUserId" placeholder="1784..." /></div>
          <div><label for="recipientId">Recipient ID (PSID/IGSID)</label><input id="recipientId" placeholder="USER_ID ที่คุยกับเรา" /></div>
        </div>
        <div style="margin-top:10px"><label for="accessToken">Page/IG Access Token</label><input id="accessToken" type="password" placeholder="EAAG..." /></div>
        <button class="ig" id="connectBtn">Connect Instagram</button>
        <div id="connectStatus"></div>
        <div style="margin-top:10px"><label for="replyIndex">เลือกข้อความที่จะส่ง</label>
          <select id="replyIndex"><option value="0">Reply #1 (ปลอดภัย)</option><option value="1">Reply #2 (มีอารมณ์)</option><option value="2">Reply #3 (ขี้เล่น)</option></select>
        </div>
        <button class="secondary" id="sendBtn">Send to Instagram</button>
        <div id="sendStatus"></div>
      </section>

      <section class="card">
        <h3>Output JSON</h3>
        <pre id="output">{
  "insight": "...",
  "replies": ["...", "...", "..."]
}</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
